<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOCA 公众号文章编辑器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; }

/* 顶部工具栏 */
.toolbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: #1a1a2e; color: #fff; padding: 10px 24px;
  display: flex; align-items: center; justify-content: space-between;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.toolbar-left { display: flex; align-items: center; gap: 16px; }
.toolbar h1 { font-size: 16px; font-weight: 600; white-space: nowrap; }
.toolbar h1 span { color: #75a340; }
.theme-selector-wrap {
  display: flex; align-items: center; gap: 8px;
}
.theme-selector-wrap label {
  font-size: 12px; color: #9ca3af; white-space: nowrap;
}
#theme-select {
  padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.08); color: #fff; font-size: 13px;
  cursor: pointer; outline: none; min-width: 140px;
}
#theme-select:hover { background: rgba(255,255,255,0.15); }
#theme-select option { background: #1a1a2e; color: #fff; }
.theme-desc {
  font-size: 11px; color: #6b7280; max-width: 300px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.toolbar-actions { display: flex; gap: 8px; }
.toolbar-actions button {
  padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all 0.2s;
}
.btn-primary { background: #75a340; color: #1a1a2e; }
.btn-primary:hover { background: #22c55e; }
.btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
.btn-secondary:hover { background: rgba(255,255,255,0.2); }
.btn-danger { background: #ef4444; color: #fff; }
.btn-danger:hover { background: #dc2626; }

/* 主布局 */
.main { display: flex; margin-top: 52px; height: calc(100vh - 52px); }

/* 左侧：Markdown 编辑区 */
.editor-panel {
  flex: 1; display: flex; flex-direction: column;
  border-right: 1px solid #e5e7eb;
}
.panel-header {
  padding: 10px 16px; background: #fff; border-bottom: 1px solid #e5e7eb;
  font-size: 13px; font-weight: 600; color: #6b7280;
  display: flex; justify-content: space-between; align-items: center;
}
.panel-header .char-count { font-weight: 400; color: #9ca3af; }
#markdown-editor {
  flex: 1; padding: 20px; border: none; outline: none; resize: none;
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 14px;
  line-height: 1.7; color: #374151; background: #fafafa;
  tab-size: 2;
}

/* 右侧：微信预览区 */
.preview-panel {
  flex: 1; display: flex; flex-direction: column; background: #e5e7eb;
}
.phone-frame {
  flex: 1; overflow: hidden; display: flex; justify-content: center;
  padding: 20px;
}
.phone-screen {
  width: 375px; height: 100%;
  background: #fff; border-radius: 12px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.1);
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}

/* 微信文章样式 - 基础结构（内容样式由主题动态生成） */
.wechat-header {
  padding: 20px 20px 16px; border-bottom: 1px solid #f0f0f0;
}
.wechat-header .title {
  font-size: 22px; font-weight: 700; color: #1a1a1a;
  line-height: 1.4; margin-bottom: 12px;
}
.wechat-header .meta {
  font-size: 12px; color: #999; display: flex; gap: 12px;
}
.wechat-content {
  padding: 20px; font-size: 16px; line-height: 1.85;
  color: #2d3748; letter-spacing: 0.3px;
}

/* 底部状态栏 */
.status-bar {
  padding: 8px 16px; background: #fff; border-top: 1px solid #e5e7eb;
  font-size: 12px; color: #9ca3af;
  display: flex; justify-content: space-between;
}

/* 模式切换 */
.mode-tabs { display: flex; gap: 2px; }
.mode-tab {
  padding: 4px 12px; border-radius: 4px; cursor: pointer;
  font-size: 12px; transition: all 0.2s;
}
.mode-tab.active { background: rgba(255,255,255,0.2); }

/* 导入弹窗 */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 200; justify-content: center; align-items: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 12px; padding: 24px;
  width: 500px; max-height: 80vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 16px; }
.modal textarea {
  width: 100%; height: 200px; border: 1px solid #e5e7eb;
  border-radius: 8px; padding: 12px; font-size: 14px;
  font-family: monospace; resize: vertical;
}
.modal .actions { margin-top: 16px; display: flex; gap: 8px; justify-content: flex-end; }

/* 主题色带指示器 */
.theme-color-bar {
  height: 3px; width: 100%; transition: background 0.3s;
}
</style>
</head>

    </div>

  <div class="toolbar-actions">

    <button class="btn-primary" onclick="copyWechatHTML()">复制微信 HTML</button>
  </div>
</div>

<div class="main">
  <!-- 左侧编辑器 -->
  <div class="editor-panel">
    <div class="panel-header">
      <span>Markdown 编辑</span>
      <span class="char-count" id="char-count">0 字</span>
    </div>
    <textarea id="markdown-editor" placeholder="在这里编写文章..." spellcheck="false"></textarea>
    <div class="status-bar">
      <span id="reading-time">预估阅读 0 分钟</span>
      <span>实时预览</span>
    </div>
  </div>

  <!-- 右侧预览 -->
  <div class="preview-panel">
    <div class="panel-header">
      <span>微信预览 (375px)</span>
      <span class="char-count" id="preview-info"></span>
    </div>
    <div class="theme-color-bar" id="theme-color-bar"></div>
    <div class="phone-frame">
      <div class="phone-screen">
        <div class="wechat-header">
          <div class="title" id="preview-title">文章标题</div>
          <div class="meta">
            <span>先人掌</span>
            <span id="preview-date"></span>
          </div>
        </div>
        <div class="wechat-content" id="preview-content">
          <p style="color:#999; text-align:center;">开始编辑，实时预览</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 导入弹窗 -->
<div class="modal-overlay" id="import-modal">
  <div class="modal">
    <h3>导入 Markdown 文件</h3>
    <input type="file" id="file-input" accept=".md,.markdown,.txt" style="margin-bottom:12px;">
    <div class="actions">
      <button class="btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn-primary" onclick="loadFile()">导入</button>
    </div>
  </div>
</div>

// ======= 当前主题 =======
let currentThemeKey = 'moca';

function getCurrentTheme() {
  return THEMES[currentThemeKey] || THEMES['newspaper'];
}

// 将 snake_case 的样式对象转成 inline style 字符串
function toInlineStyle(styleObj) {
  if (!styleObj) return '';
  return Object.entries(styleObj).map(([k, v]) => {
    // snake_case -> kebab-case: font_size -> font-size
    const prop = k.replace(/_/g, '-');
    return prop + ':' + v;
  }).join(';');
}

// ======= Markdown 解析器（主题感知） =======
function parseMarkdown(md) {
  const theme = getCurrentTheme();
  const s = theme.styles || {};

  const h2Style = toInlineStyle(s.h2);
  const h3Style = toInlineStyle(s.h3);
  const pStyle = toInlineStyle(s.p);
  const blockquoteStyle = toInlineStyle(s.blockquote);
  const strongStyle = toInlineStyle(s.strong);
  const emStyle = toInlineStyle(s.em);
  const hrStyle = toInlineStyle(s.hr);
  const codeStyle = toInlineStyle(s.code);
  const aStyle = toInlineStyle(s.a);
  const liTextStyle = toInlineStyle(s.list_item_text);
  const listWrapStyle = toInlineStyle(s.list_wrapper);
  const listRowStyle = toInlineStyle(s.list_item_row);
  const ulBulletStyle = toInlineStyle(s.list_item_bullet);
  const olBulletStyle = toInlineStyle(s.ol_item_bullet);

  const lines = md.split('\n');
  let html = '';
  let title = '';
  let inList = false;
  let listType = '';
  let olCounter = 0;

  function closeList() {
    if (inList) {
      html += '</section>';
      inList = false;
      olCounter = 0;
    }
  }

  function formatInline(text) {
    // 加粗
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="' + strongStyle + '">$1</strong>');
    // 斜体
    text = text.replace(/\*(.+?)\*/g, '<em style="' + emStyle + '">$1</em>');
    // 行内代码
    text = text.replace(/`(.+?)`/g, '<code style="' + codeStyle + '">$1</code>');
    // 链接
    text = text.replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2" style="' + aStyle + '">$1</a>');
    return text;
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // 跳过 YAML frontmatter
    if (i === 0 && line.trim() === '---') {
      while (i < lines.length - 1 && lines[++i].trim() !== '---') {}
      continue;
    }

    // H1 标题
    if (line.startsWith('# ') && !title) {
      title = line.slice(2).replace(/\*\*/g, '');
      continue;
    }

    // 元数据行
    if (line.startsWith('**作者') || line.startsWith('**日期')) continue;

    // 关闭列表
    if (inList && !line.match(/^\d+\.|\*|-/) && line.trim() !== '') {
      closeList();
    }

    // H2
    if (line.startsWith('## ')) {
      closeList();
      html += '<h2 style="' + h2Style + '">' + line.slice(3).replace(/\*\*/g, '') + '</h2>';
      continue;
    }

    // H3
    if (line.startsWith('### ')) {
      closeList();
      html += '<h3 style="' + h3Style + '">' + line.slice(4).replace(/\*\*/g, '') + '</h3>';
      continue;
    }

    // 分隔线
    if (line.trim() === '---') {
      closeList();
      html += '<hr style="' + hrStyle + '">';
      continue;
    }

    // blockquote
    if (line.startsWith('> ')) {
      closeList();
      const bqpStyle = toInlineStyle(s.blockquote_p);
      html += '<blockquote style="' + blockquoteStyle + '"><p style="' + bqpStyle + '">' + formatInline(line.slice(2)) + '</p></blockquote>';
      continue;
    }

    // 有序列表
    if (line.match(/^\d+\.\s/)) {
      if (!inList || listType !== 'ol') {
        closeList();
        html += '<section style="' + listWrapStyle + '">';
        inList = true;
        listType = 'ol';
        olCounter = 0;
      }
      olCounter++;
      const content = formatInline(line.replace(/^\d+\.\s/, ''));
      html += '<section style="' + listRowStyle + '">';
      html += '<span style="' + olBulletStyle + '">' + olCounter + '</span>';
      html += '<span style="' + liTextStyle + '">' + content + '</span>';
      html += '</section>';
      continue;
    }

    // 无序列表
    if (line.match(/^[-*]\s/)) {
      if (!inList || listType !== 'ul') {
        closeList();
        html += '<section style="' + listWrapStyle + '">';
        inList = true;
        listType = 'ul';
      }
      const content = formatInline(line.replace(/^[-*]\s/, ''));
      html += '<section style="' + listRowStyle + '">';
      html += '<span style="' + ulBulletStyle + '">&#8226;</span>';
      html += '<span style="' + liTextStyle + '">' + content + '</span>';
      html += '</section>';
      continue;
    }

    // 空行
    if (line.trim() === '') {
      if (inList) closeList();
      continue;
    }

    // 普通段落
    html += '<p style="' + pStyle + '">' + formatInline(line) + '</p>';
  }

  closeList();
  return { title, html };
}

const editor = document.getElementById('markdown-editor');
const previewTitle = document.getElementById('preview-title');
const previewContent = document.getElementById('preview-content');
const charCount = document.getElementById('char-count');
const readingTime = document.getElementById('reading-time');
const previewDate = document.getElementById('preview-date');
const previewInfo = document.getElementById('preview-info');
const themeSelect = document.getElementById('theme-select');
const themeDesc = document.getElementById('theme-desc');
const themeColorBar = document.getElementById('theme-color-bar');

previewDate.textContent = new Date().toLocaleDateString('zh-CN');

// 主题切换
themeSelect.addEventListener('change', () => {
  currentThemeKey = themeSelect.value;
  updateThemeUI();
  render();
});

function updateThemeUI() {
  const theme = getCurrentTheme();
  const accent = (theme.colors && theme.colors.accent) || '#333';
  themeDesc.textContent = theme.description || '';
  previewInfo.textContent = theme.name || currentThemeKey;
  themeColorBar.style.background = 'linear-gradient(90deg, ' + accent + ', transparent)';

  // 更新预览区 wrapper 背景
  const wrapperBg = (theme.styles && theme.styles.wrapper && theme.styles.wrapper.background_color) || '#ffffff';
  const contentEl = document.getElementById('preview-content');
  contentEl.style.background = wrapperBg;
  const wrapperPad = (theme.styles && theme.styles.wrapper && theme.styles.wrapper.padding) || '20px';
  contentEl.style.padding = wrapperPad;
}

let debounceTimer;
editor.addEventListener('input', () => {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(render, 150);
});

function render() {
  const md = editor.value;
  const { title, html } = parseMarkdown(md);

  previewTitle.textContent = title || '文章标题';
  previewContent.innerHTML = html || '<p style="color:#999;text-align:center;">开始编辑，实时预览</p>';

  // 字数统计
  const plainText = md.replace(/[#*\-_\[\]()>|`]/g, '').replace(/\s+/g, '');
  const chars = plainText.length;
  charCount.textContent = chars + ' 字';

  // 阅读时间
  const minutes = Math.max(1, Math.round(chars / 350));
  readingTime.textContent = '预估阅读 ' + minutes + ' 分钟';
}

// 导入文件
function importFile() {
  document.getElementById('import-modal').classList.add('show');
}

function closeModal() {
  document.getElementById('import-modal').classList.remove('show');
}

function loadFile() {
  const fileInput = document.getElementById('file-input');
  if (!fileInput.files.length) return alert('请选择文件');

  const reader = new FileReader();
  reader.onload = (e) => {
    editor.value = e.target.result;
    render();
    closeModal();
  };
  reader.readAsText(fileInput.files[0]);
}

// 导出 Markdown
function exportMarkdown() {
  const blob = new Blob([editor.value], { type: 'text/markdown' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'moca-article.md';
  a.click();
}

// 复制微信 HTML
function copyWechatHTML() {
  const theme = getCurrentTheme();
  const s = theme.styles || {};
  const wrapperStyle = toInlineStyle(s.wrapper);

  const { title, html } = parseMarkdown(editor.value);

  const fullHTML = '<section style="max-width:100%;font-family:-apple-system,BlinkMacSystemFont,\'Helvetica Neue\',\'PingFang SC\',\'Hiragino Sans GB\',\'Microsoft YaHei\',sans-serif;' + wrapperStyle + '">\n' + html + '\n</section>';

  navigator.clipboard.writeText(fullHTML).then(() => {
    const btn = document.querySelector('.btn-primary');
    const orig = btn.textContent;
    btn.textContent = '已复制!';
    btn.style.background = '#22c55e';
    setTimeout(() => { btn.textContent = orig; btn.style.background = '#75a340'; }, 1500);
  });
}

// 快捷键
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    exportMarkdown();
  }
});
